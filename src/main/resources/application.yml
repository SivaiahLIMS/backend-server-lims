server:
  port: ${PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: lims

  jackson:
    serialization:
      fail-on-empty-beans: false

  datasource:
    url: ${DB_URL:jdbc:postgresql:///${DB_NAME:lims_db}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME:surya-welcome-demo-2026:asia-south1:lims-postgres}&socketFactory=com.google.cloud.sql.postgres.SocketFactory}
    username: ${DB_USERNAME:lims_user}
    password: ${DB_PASSWORD:Lims@123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true